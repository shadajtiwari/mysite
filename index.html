<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shadaj Tiwari — Product Manager</title>
  <link rel="icon" href="https://api.dicebear.com/7.x/initials/svg?seed=S&backgroundColor=ffffff&textColor=EBE4E4" type="image/svg+xml"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --black: #080A0E;
      --surface: #0D1117;
      --surface2: #131820;
      --border: rgba(255,255,255,0.06);
      --border-accent: rgba(56, 107, 248, 0.3);
      --text: #E8EDF5;
      --muted: #737b96;
      --accent: #c02d2d;
      --accent2: #eb7e68;
      --gold: #F0C060;
      --glow: rgba(56,189,248,0.12);
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }

    /* NOISE OVERLAY */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 999; opacity: 0.4;
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--black); }
    ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 2px; }

    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 4rem;
      background: rgba(8,10,14,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav-logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.3rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      color: var(--text);
      text-decoration: none;
    }
    .nav-logo span { color: var(--accent); }
    .nav-links { display: flex; gap: 2.5rem; list-style: none; }
    .nav-links a {
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--accent); }

    /* HERO — animated */
    @keyframes blink      { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes scanAnim   { 0%{top:-2px} 100%{top:100%} }
    @keyframes pulseRing  { 0%{transform:scale(1);opacity:.7} 100%{transform:scale(2.4);opacity:0} }
    @keyframes rotateCW   { to{transform:translateY(-50%) rotate(360deg)} }
    @keyframes rotateCCW  { to{transform:translateY(-50%) rotate(-360deg)} }
    @keyframes glowBreath { 0%,100%{opacity:.3} 50%{opacity:.7} }
    @keyframes cardIn     { from{opacity:0;transform:translateY(16px) scale(.93)} to{opacity:1;transform:translateY(0) scale(1)} }
    @keyframes statusBar  { from{opacity:0} to{opacity:.45} }

    .hero {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: flex-start;
      padding: 0 5rem;
      position: relative;
      overflow: hidden;
      cursor: none;
    }
    /* particle canvas */
    #hero-canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      opacity: .7; pointer-events: none;
    }
    /* grid */
    .hero-grid-lines {
      position: absolute; inset: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(56,189,248,.03) 1px,transparent 1px),
        linear-gradient(90deg,rgba(56,189,248,.03) 1px,transparent 1px);
      background-size: 60px 60px;
    }
    /* ambient glows */
    .hero-glow {
      position: absolute; top:-200px; right:-200px;
      width:700px; height:700px; border-radius:50%;
      background: radial-gradient(circle,rgba(56,189,248,.07) 0%,transparent 65%);
      animation: glowBreath 4s ease-in-out infinite;
      pointer-events: none;
    }
    .hero-glow2 {
      position: absolute; bottom:-150px; left:15%;
      width:500px; height:500px; border-radius:50%;
      background: radial-gradient(circle,rgba(129,140,248,.06) 0%,transparent 65%);
      animation: glowBreath 6s ease-in-out infinite reverse;
      pointer-events: none;
    }
    /* scanline */
    .hero-scan {
      position:absolute; inset:0; overflow:hidden; pointer-events:none; z-index:2;
    }
    .hero-scan::after {
      content:''; position:absolute; left:0; right:0; height:2px;
      background: linear-gradient(90deg,transparent,rgba(56,189,248,.13),transparent);
      animation: scanAnim 5s linear infinite;
    }
    /* orbit rings */
    .orbit-wrap {
      position:absolute; right:7%; top:50%;
      transform:translateY(-50%);
      width:360px; height:360px;
      pointer-events:none;
    }
    .orbit-cw  { position:absolute; inset:0; animation: rotateCW  30s linear infinite; transform-origin:center center; }
    .orbit-ccw { position:absolute; inset:0; animation: rotateCCW 20s linear infinite; transform-origin:center center; }
    /* metric cards */
    .metric-card {
      position:absolute; opacity:0;
      background:rgba(13,17,27,.88);
      backdrop-filter:blur(14px);
      padding:14px 20px; min-width:115px;
      pointer-events:none;
    }
    .metric-card.show { animation: cardIn .7s cubic-bezier(.34,1.56,.64,1) forwards; }
    .metric-num { font-family:'DM Mono',monospace; font-size:22px; font-weight:600; line-height:1; margin-bottom:4px; }
    .metric-lbl { font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:rgba(255,255,255,.4); }
    .mc-corner { position:absolute; width:8px; height:8px; }
    /* cursor */
    #h-cursor-dot  { position:fixed; pointer-events:none; z-index:9999; width:8px; height:8px; border-radius:50%; background:var(--accent); transform:translate(-50%,-50%); }
    #h-cursor-ring { position:fixed; pointer-events:none; z-index:9998; width:32px; height:32px; border-radius:50%; border:1px solid rgba(56,189,248,.5); transform:translate(-50%,-50%); transition:left .12s ease,top .12s ease; }
    /* main content */
    .hero-content {
      position:relative; z-index:10;
      max-width:680px;
      will-change:transform;
      transition:transform .15s ease-out;
    }
    /* eyebrow */
    .hero-eyebrow {
      display:flex; align-items:center; gap:12px;
      margin-bottom:20px;
      opacity:0; animation:fadeUp .7s .2s ease forwards;
    }
    .pulse-wrap { position:relative; width:10px; height:10px; flex-shrink:0; }
    .pulse-ring { position:absolute; inset:0; border-radius:50%; background:var(--accent); animation:pulseRing 1.8s ease-out infinite; }
    .pulse-core { position:relative; width:10px; height:10px; border-radius:50%; background:var(--accent); }
    .eyebrow-txt { font-family:'DM Mono',monospace; font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); }
    /* name */
    .hero-name {
      font-family:'Cormorant Garamond',serif;
      font-size:clamp(3.2rem,8vw,6.5rem);
      font-weight:300; line-height:.95; letter-spacing:-.02em;
      color:var(--text); margin-bottom:20px;
      opacity:0; animation:fadeUp .8s .35s ease forwards;
    }
    .hero-name em { font-style:italic; color:var(--accent); }
    /* typewriter */
    .hero-tw-line {
      font-family:'DM Mono',monospace;
      font-size:clamp(.85rem,1.5vw,1.05rem);
      min-height:28px; margin-bottom:24px;
      opacity:0; animation:fadeUp .6s .7s ease forwards;
    }
    #tw-text { color:var(--accent); }
    .tw-caret {
      display:inline-block; width:2px; height:1em;
      background:var(--accent); margin-left:3px;
      vertical-align:middle; animation:blink 1s step-end infinite;
    }
    /* description */
    .hero-desc {
      font-size:clamp(.9rem,1.3vw,1rem); font-weight:300;
      color:var(--muted); line-height:1.75; max-width:520px; margin-bottom:36px;
      opacity:0; animation:fadeUp .7s .9s ease forwards;
    }
    .hero-desc .gc { color:#4285F4; font-weight:700; }
    .hero-desc .ac { color:#A855F7; font-weight:700; }
    /* cta */
    .hero-cta {
      display:flex; gap:16px; flex-wrap:wrap;
      opacity:0; animation:fadeUp .7s 1.1s ease forwards;
    }
    .btn-primary {
      padding:.8rem 1.8rem; background:var(--accent); color:#080A0E;
      font-size:11px; font-family:'DM Sans',sans-serif; font-weight:600;
      letter-spacing:.12em; text-transform:uppercase; text-decoration:none;
      border:none; cursor:pointer; transition:all .2s;
    }
    .btn-primary:hover { background:#7DD3FC; transform:translateY(-2px); box-shadow:0 8px 24px rgba(56,189,248,.35); }
    .btn-outline {
      padding:.8rem 1.8rem; background:transparent; color:var(--text);
      font-size:11px; font-family:'DM Sans',sans-serif; font-weight:500;
      letter-spacing:.12em; text-transform:uppercase; text-decoration:none;
      border:1px solid rgba(56,189,248,.3); cursor:pointer; transition:all .2s;
    }
    .btn-outline:hover { border-color:var(--accent); color:var(--accent); transform:translateY(-2px); }
    /* divider */
    .hero-divider {
      display:flex; align-items:center; gap:16px; margin-top:48px;
      opacity:0; animation:statusBar 1s 1.4s ease forwards;
    }
    .hero-divider-line { flex:1; height:1px; background:rgba(56,189,248,.2); }
    .hero-divider-txt { font-family:'DM Mono',monospace; font-size:13px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); font-weight:900;}
    /* status bar */
    .hero-status {
      position:absolute; bottom:28px; left:5rem; right:5rem;
      display:flex; justify-content:space-between; align-items:center;
      opacity:0; animation:statusBar 1s 1.6s ease forwards;
    }
    .hero-status span { font-family:'DM Mono',monospace; font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--accent); }

    /* SECTIONS */
    section { padding: 7rem 4rem; }
    .section-label {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 1rem;
    }
    .section-label::after {
      content: ''; flex: 1;
      height: 1px; background: var(--border);
      max-width: 80px;
    }
    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 4vw, 3.2rem);
      font-weight: 300;
      line-height: 1.1;
      margin-bottom: 3rem;
    }
    .section-title em { font-style: italic; color: var(--accent); }

    /* ABOUT */
    #about { background: var(--surface); }
    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6rem;
      align-items: start;
    }
    .about-text p {
      color: #A8B5CC;
      font-size: 1rem;
      line-height: 1.85;
      margin-bottom: 1.5rem;
    }
    .about-text p:first-child {
      font-size: 1.15rem;
      color: var(--text);
    }
    .about-side { display: flex; flex-direction: column; gap: 2rem; }
    .contact-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 1.25rem 1.5rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      transition: border-color 0.2s;
    }
    .contact-item:hover { border-color: var(--border-accent); }
    .contact-icon { color: var(--accent); font-size: 1.2rem; width: 20px; text-align: center; }
    .contact-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .contact-value { font-size: 0.9rem; color: var(--text); }
    .contact-value a { color: var(--accent); text-decoration: none; }
    .contact-value a:hover { text-decoration: underline; }

    /* EXPERIENCE */
    #experience { background: var(--black); }
    .exp-timeline { display: flex; flex-direction: column; gap: 0; }
    .exp-item {
      display: grid;
      grid-template-columns: 240px 1fr;
      gap: 3rem;
      padding: 3rem 0;
      border-bottom: 1px solid var(--border);
      position: relative;
    }
    .exp-item:first-child { padding-top: 0; }
    .exp-item::before {
      content: '';
      position: absolute; left: 240px;
      top: 0; bottom: 0;
      width: 1px;
      background: var(--border);
    }
    .exp-meta { padding-right: 3rem; }
    .exp-company {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .exp-period {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
    }
    .exp-location {
      font-size: 0.8rem;
      color: var(--muted);
    }
    .exp-content { padding-left: 3rem; }
    .exp-role {
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 1.25rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .role-badge {
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.2rem 0.6rem;
      background: rgba(56,189,248,0.1);
      color: var(--accent);
      border: 1px solid rgba(56,189,248,0.2);
    }
    .exp-bullets { list-style: none; display: flex; flex-direction: column; gap: 0.75rem; }
    .exp-bullets li {
      font-size: 0.92rem;
      color: #94A3B8;
      padding-left: 1.25rem;
      position: relative;
      line-height: 1.65;
    }
    .exp-bullets li::before {
      content: '▸';
      position: absolute; left: 0;
      color: var(--accent);
      font-size: 0.7rem;
      top: 0.3rem;
    }
    .exp-bullets li strong { color: var(--text); font-weight: 500; }
    .exp-sub-role {
      margin-top: 2rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
    }

    /* SKILLS */
    #skills { background: var(--surface); }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }
    .skill-card {
      padding: 2rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .skill-card:hover {
      border-color: var(--border-accent);
      transform: translateY(-4px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.3);
    }
    .skill-card::after {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      transform: scaleX(0);
      transform-origin: left;
      transition: transform 0.3s;
    }
    .skill-card:hover::after { transform: scaleX(1); }
    .skill-card-icon { font-size: 1.8rem; margin-bottom: 1rem; }
    .skill-card-title {
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .skill-tags { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .skill-tag {
      font-size: 0.78rem;
      padding: 0.3rem 0.75rem;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      color: #94A3B8;
      transition: all 0.2s;
    }
    .skill-tag:hover {
      background: rgba(56,189,248,0.08);
      border-color: rgba(56,189,248,0.3);
      color: var(--accent);
    }

    /* CERTIFICATIONS */
    #certifications { background: var(--black); }
    .cert-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
    }
    .cert-card {
      display: flex; align-items: flex-start; gap: 1.25rem;
      padding: 1.75rem 2rem;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.25s;
    }
    .cert-card:hover {
      border-color: var(--border-accent);
      background: var(--surface2);
    }
    .cert-icon {
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(56,189,248,0.08);
      border: 1px solid rgba(56,189,248,0.15);
      color: var(--accent);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .cert-name {
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 0.25rem;
    }
    .cert-org {
      font-size: 0.78rem;
      color: var(--muted);
    }

    /* EDUCATION */
    #education { background: var(--surface); }
    .edu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .edu-card {
      padding: 2.5rem;
      border: 1px solid var(--border);
      background: var(--surface2);
      position: relative;
      overflow: hidden;
      transition: all 0.3s;
    }
    .edu-card:hover { border-color: var(--border-accent); }
    .edu-card-accent {
      position: absolute; top: 0; left: 0;
      width: 4px; height: 100%;
      background: linear-gradient(180deg, var(--accent), var(--accent2));
    }
    .edu-year {
      font-family: 'DM Mono', monospace;
      font-size: 0.72rem;
      color: var(--accent);
      letter-spacing: 0.1em;
      margin-bottom: 0.75rem;
    }
    .edu-degree {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.5rem;
      font-weight: 400;
      color: var(--text);
      margin-bottom: 0.5rem;
    }
    .edu-school { font-size: 0.9rem; color: var(--muted); }

    /* AWARDS */
    #awards { background: var(--black); }
    .awards-row { display: flex; gap: 2rem; flex-wrap: wrap; }
    .award-pill {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 1rem 1.75rem;
      border: 1px solid var(--border);
      background: var(--surface);
      transition: all 0.25s;
    }
    .award-pill:hover {
      border-color: rgba(240,192,96,0.4);
      background: rgba(240,192,96,0.05);
    }
    .award-icon { color: var(--gold); font-size: 1.1rem; }
    .award-text { font-size: 0.9rem; color: var(--text); }

    /* FOOTER */
    footer {
      padding: 3rem 4rem;
      border-top: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: center;
      background: var(--black);
    }
    .footer-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      color: var(--muted);
    }
    .footer-links { display: flex; gap: 2rem; }
    .footer-links a {
      font-size: 0.78rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--accent); }

    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeLeft {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .fade-in {
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.6s ease, transform 0.6s ease;
    }
    .fade-in.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── TABLET (≤900px) ── */
    @media (max-width: 900px) {
      /* Nav */
      nav { padding: 1.25rem 1.5rem; }
      .nav-links { display: none; }

      /* Sections */
      section { padding: 4rem 1.5rem; }

      /* Hero — stack vertically, remove decorative elements that overlap */
      .hero {
        padding: 6rem 1.5rem 5rem;
        align-items: flex-start;
        cursor: auto;
        min-height: 100svh;
      }
      .hero-content { max-width: 100%; }
      .orbit-wrap   { display: none; }
      .metric-card  { display: none; }
      .hero-status  { left: 1.5rem; right: 1.5rem; bottom: 16px; }
      #h-cursor-dot, #h-cursor-ring { display: none; }

      /* About */
      .about-grid { grid-template-columns: 1fr; gap: 2.5rem; }

      /* Experience */
      .exp-item { grid-template-columns: 1fr; gap: 1rem; }
      .exp-item::before { display: none; }
      .exp-meta  { padding-right: 0; }
      .exp-content { padding-left: 0; }

      /* Skills */
      .skills-grid { grid-template-columns: 1fr 1fr; }

      /* Certs */
      .cert-grid { grid-template-columns: 1fr; }

      /* Education */
      .edu-grid { grid-template-columns: 1fr; }

      /* Footer */
      footer { flex-direction: column; gap: 1.5rem; text-align: center; padding: 2rem 1.5rem; }
    }

    /* ── MOBILE (≤480px) ── */
    @media (max-width: 480px) {
      /* Nav */
      nav { padding: 1rem 1.25rem; }

      /* Sections */
      section { padding: 3.5rem 1.25rem; }

      /* Hero */

    function useFadeIn() {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { el.classList.add('visible'); obs.unobserve(el); } },
          { threshold: 0.1 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, []);
      return ref;
    }

    function FadeIn({ children, delay = 0 }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const obs = new IntersectionObserver(
          ([entry]) => { if (entry.isIntersecting) { setTimeout(() => el.classList.add('visible'), delay); obs.unobserve(el); } },
          { threshold: 0.08 }
        );
        obs.observe(el);
        return () => obs.disconnect();
      }, [delay]);
      return <div ref={ref} className="fade-in">{children}</div>;
    }

    // ── Typewriter hook ──────────────────────────────────────────────────────
    function useTypewriter(words, speed=75, pause=2100) {
      const [text, setText] = React.useState('');
      const state = React.useRef({ wi:0, ci:0, del:false });
      React.useEffect(() => {
        let t;
        const tick = () => {
          const { wi, ci, del } = state.current;
          const word = words[wi];
          if (!del && ci < word.length) {
            setText(word.slice(0, ci+1));
            state.current.ci++;
            t = setTimeout(tick, speed);
          } else if (!del && ci === word.length) {
            t = setTimeout(() => { state.current.del = true; tick(); }, pause);
          } else if (del && ci > 0) {
            setText(word.slice(0, ci-1));
            state.current.ci--;
            t = setTimeout(tick, speed/2);
          } else {
            state.current.del = false;
            state.current.wi = (wi+1) % words.length;
            t = setTimeout(tick, 200);
          }
        };
        t = setTimeout(tick, 800);
        return () => clearTimeout(t);
      }, []);
      return text;
    }

    // ── Particle canvas ──────────────────────────────────────────────────────
    function ParticleCanvas() {
      const canvasRef = React.useRef(null);
      const mouse = React.useRef({ x: null, y: null });
      React.useEffect(() => {
        const canvas = canvasRef.current;
        const ctx = canvas.getContext('2d');
        let W, H, raf;
        const resize = () => { W = canvas.width = canvas.offsetWidth; H = canvas.height = canvas.offsetHeight; };
        resize();
        window.addEventListener('resize', resize);
        const pts = Array.from({length:85}, () => ({
          x: Math.random()*1000, y: Math.random()*700,
          vx:(Math.random()-.5)*.28, vy:(Math.random()-.5)*.28,
          r: Math.random()*1.4+.4, a: Math.random()*.45+.18
        }));
        const draw = () => {
          ctx.clearRect(0,0,W,H);
          const mx=mouse.current.x, my=mouse.current.y;
          pts.forEach(p => {
            if(mx&&my){ const dx=p.x-mx,dy=p.y-my,d=Math.hypot(dx,dy); if(d<110){ p.vx+=(dx/d)*.038; p.vy+=(dy/d)*.038; } }
            p.vx*=.99; p.vy*=.99; p.x+=p.vx; p.y+=p.vy;
            if(p.x<0)p.x=W; if(p.x>W)p.x=0; if(p.y<0)p.y=H; if(p.y>H)p.y=0;
          });
          for(let i=0;i<pts.length;i++) for(let j=i+1;j<pts.length;j++){
            const dx=pts[i].x-pts[j].x, dy=pts[i].y-pts[j].y, d=Math.hypot(dx,dy);
            if(d<95){ ctx.beginPath(); ctx.moveTo(pts[i].x,pts[i].y); ctx.lineTo(pts[j].x,pts[j].y);
              ctx.strokeStyle=`rgba(56,189,248,${.11*(1-d/95)})`; ctx.lineWidth=.6; ctx.stroke(); }
          }
          pts.forEach(p=>{ ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2); ctx.fillStyle=`rgba(56,189,248,${p.a})`; ctx.fill(); });
          raf = requestAnimationFrame(draw);
        };
        draw();
        const heroEl = canvas.parentElement;
        const mm = e => { const r=heroEl.getBoundingClientRect(); mouse.current={x:e.clientX-r.left,y:e.clientY-r.top}; };
        const ml = () => { mouse.current={x:null,y:null}; };
        heroEl.addEventListener('mousemove', mm);
        heroEl.addEventListener('mouseleave', ml);
        return () => { cancelAnimationFrame(raf); window.removeEventListener('resize',resize); heroEl.removeEventListener('mousemove',mm); heroEl.removeEventListener('mouseleave',ml); };
      }, []);
      return <canvas ref={canvasRef} id="hero-canvas"/>;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
